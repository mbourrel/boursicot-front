<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- PWA / Theme -->
    <meta name="theme-color" content="#1a7878" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Boursicot Pro" />
    <meta name="application-name" content="Boursicot Pro" />
    <meta name="msapplication-TileColor" content="#1a7878" />
    <meta name="msapplication-TileImage" content="/icons/icon-144x144.png" />

    <!-- Description -->
    <meta name="description" content="Boursicot — Analyse fondamentale et graphiques boursiers" />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png" />

    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192x192.png" />

    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <title>Boursicot Pro</title>
    <!-- Capture beforeinstallprompt avant le montage React pour ne jamais manquer l'événement -->
    <script>
      window.__pwaInstallPrompt = null;
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window.__pwaInstallPrompt = e;
      });
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
